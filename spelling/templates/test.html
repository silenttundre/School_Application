<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Spelling Test</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="card">
      <h1>✏️ Super Speller Adventure 🚀</h1>
      <div id="app">
        <div id="card">
          <div class="progress-container">
            <div id="progress-bar"></div>
          </div>
          <p id="progress"></p>

          <h2 id="word-display">🎧 Listen and type the spelling!</h2>

          <div class="controls" style="justify-content:center;">
            <button id="say-word" class="btn-secondary">🔊 Say Word</button>
            <button id="say-sentence" class="btn-secondary">📖 Say Sentence</button>
          </div>

          <label>✍️ Type the spelling:</label>
          <input id="spelling-input" autocomplete="off" placeholder="Type your spelling here...">

          <label>🏷️ What part of speech is this word?</label>
          <input id="pos-input" placeholder="noun / verb / adjective...">

          <div id="affix-area" style="display:none">
            <label>🧩 Affix Challenge!</label>
            <p id="affix-prompt"></p>
            <input id="affix-input" placeholder="Explain what the prefix/suffix means">
          </div>

          <div class="controls" style="justify-content:center;">
            <button id="next-btn" class="btn-primary">Next ➡️</button>
          </div>
        </div>

        <div id="done" style="display:none">
          <h2>🎉 You did it! 🎉</h2>
          <p style="font-size:1.3rem;">Time to see your awesome score!</p>
          <button id="submit-btn" class="btn-primary">🏆 Show My Score!</button>
        </div>
      </div>

      <div id="results" style="display:none">
        <h2>🌟 Your Results 🌟</h2>
        <div id="results-area"></div>
        <div class="controls" style="justify-content:center;margin-top:20px;">
          <button id="retry" class="btn-secondary">🔄 Try Again</button>
          <a href="/select_test?session={{ request.args.get('session') }}" class="btn-secondary" style="text-decoration:none;display:inline-block;">🏠 Back to Tests</a>
        </div>
      </div>
    </main>

    <script>
    const words = {{ words|safe }};
    let idx = 0;
    const total = words.length;

    const order = [...Array(total).keys()];
    for (let i = order.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [order[i], order[j]] = [order[j], order[i]];
    }

    const responses = [];

    let ttsVoice = null;
    let voicesReady = false;

    function loadVoicesOnce() {
      return new Promise((resolve) => {
        function populate() {
          const v = speechSynthesis.getVoices();
          if (v.length > 0) {
            ttsVoice = v.find(x => x.lang && x.lang.startsWith('en')) || v[0];
            voicesReady = true;
            resolve();
          } else {
            setTimeout(populate, 200);
          }
        }
        populate();
      });
    }

    if ('speechSynthesis' in window) {
      loadVoicesOnce();
    }

    function speak(text) {
      if (!('speechSynthesis' in window)) return;
      const ensure = voicesReady ? Promise.resolve() : loadVoicesOnce();
      ensure.then(() => {
        try {
          window.speechSynthesis.cancel();
          const u = new SpeechSynthesisUtterance(text);
          if (ttsVoice) u.voice = ttsVoice;
          u.lang = (ttsVoice && ttsVoice.lang) ? ttsVoice.lang : 'en-US';
          u.rate = 0.95;
          window.speechSynthesis.speak(u);
        } catch (err) {
          console.error('speak error', err);
        }
      });
    }

    function fireConfetti() {
      const colors = ['#f472b6', '#fbbf24', '#a78bfa', '#60a5fa', '#34d399', '#f97316'];
      for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDelay = (Math.random() * 0.5) + 's';
        piece.style.animationDuration = (2 + Math.random() * 2) + 's';
        if (Math.random() > 0.5) piece.style.borderRadius = '50%';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 4000);
      }
    }

    function updateProgress(i) {
      document.getElementById('progress').innerText = `Word ${i+1} of ${total} 🎈`;
      const percent = ((i+1)/total) * 100;
      document.getElementById('progress-bar').style.width = percent + '%';
    }

    function showItem(i) {
      const w = words[order[i]];
      updateProgress(i);
      document.getElementById('spelling-input').value = '';
      document.getElementById('pos-input').value = '';
      document.getElementById('affix-input').value = '';
      if (w.prefix || w.suffix) {
        document.getElementById('affix-area').style.display = 'block';
        let p = 'This word has ' + (w.prefix ? ('prefix "'+w.prefix+'" ') : '') + (w.suffix ? ('suffix "'+w.suffix+'"') : '');
        document.getElementById('affix-prompt').innerText = p + '. Do you know what it means?';
      } else {
        document.getElementById('affix-area').style.display = 'none';
      }
      if (!w.sentence) {
        w.sentence = `Here is the word used in a sentence: The word "${w.word}" appears here.`;
      }
    }

    document.getElementById('say-word').addEventListener('click', ()=>{
        const w = words[order[idx]];
        speak(w.word);
        setTimeout(() => { speak(w.sentence); }, 5000);
        setTimeout(() => { speak(w.word); }, 10000);
    });

    document.getElementById('say-sentence').addEventListener('click', ()=>{
      const w = words[order[idx]];
      speak(w.sentence);
    });

    document.getElementById('next-btn').addEventListener('click', ()=>{
      const cur = words[order[idx]];
      responses.push({
        word: cur.word,
        sentence: cur.sentence,
        pos_expected: cur.pos,
        prefix: cur.prefix || null,
        suffix: cur.suffix || null,
        explanation: cur.explanation || null,
        spelling: document.getElementById('spelling-input').value,
        pos: document.getElementById('pos-input').value,
        affix_answer: document.getElementById('affix-input').value
      });
      idx++;
      if (idx >= total) {
        document.getElementById('card').style.display = 'none';
        document.getElementById('done').style.display = 'block';
      } else {
        showItem(idx);
      }
    });

    document.getElementById('submit-btn').addEventListener('click', async ()=>{
      const resp = await fetch('/grade', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({responses})
      });
      const data = await resp.json();
      displayResults(data);
    });

    function displayResults(data) {
        document.getElementById('done').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        const area = document.getElementById('results-area');
        area.innerHTML = '';

        const score = data.summary.fully_correct;
        const totalItems = data.summary.total_items;
        const percent = Math.round((score / totalItems) * 100);

        let emoji = '🌟';
        let message = 'Great work!';
        if (percent === 100) { emoji = '🏆'; message = 'PERFECT SCORE! You are a spelling champion!'; }
        else if (percent >= 80) { emoji = '⭐'; message = 'Awesome! You are a super speller!'; }
        else if (percent >= 60) { emoji = '👍'; message = 'Good job! Keep practicing!'; }
        else { emoji = '💪'; message = 'Nice try! Practice makes perfect!'; }

        const summary = document.createElement('p');
        summary.className = 'summary';
        summary.innerHTML = `${emoji} ${message}<br>You nailed ${score} out of ${totalItems} words!`;
        area.appendChild(summary);

        if (percent >= 80) fireConfetti();

        data.results.forEach(r => {
            const div = document.createElement('div');
            div.className = 'result-item';

            const spellingFeedback = r.spelling_ok
              ? '🎉 Correct!'
              : `❌ Oops! Correct: <strong style="color:#16a34a;">${r.correct_spelling}</strong>`;

            let posFeedback = '(not graded)';
            if (r.pos_ok === true) posFeedback = '✅ Correct';
            else if (r.pos_ok === false) posFeedback = `❌ (Expected: ${r.pos_expected})`;

            let affixFeedback = '';
            if (r.affix_ok === true) {
                affixFeedback = `✅ Nice! (${r.affix_explanation || ''})`;
            } else if (r.affix_ok === false) {
                affixFeedback = `❌ (Hint: ${r.affix_explanation || ''})`;
            }

            const allOk = r.spelling_ok && r.pos_ok !== false && r.affix_ok !== false;

            div.innerHTML = `
              <h3>${allOk ? '✅' : '❌'} ${r.word}</h3>
              <p><em>${r.sentence || ''}</em></p>
              <p>Your spelling: <strong>${r.student_spelling || '(none)'}</strong> ${spellingFeedback}</p>
              <p>Your part of speech: <strong>${r.pos_student || '(none)'}</strong> ${posFeedback}</p>
              ${affixFeedback ? `<p>Affix answer: <strong>${r.affix_answer || '(none)'}</strong> ${affixFeedback}</p>` : ''}
              <p>⭐ Points: <strong>${r.points} / ${r.max_points}</strong></p>
            `;

            if (!allOk) div.classList.add('wrong');
            area.appendChild(div);
        });

        document.getElementById('retry').addEventListener('click', () => location.reload());
    }

    showItem(0);
    </script>
  </body>
</html>
