<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Select Test Type</title>
    <link rel="stylesheet" href="/static/styles.css">
  </head>
  <body>
    <main class="card">
      <h1>🎮 Pick Your Game! 🎯</h1>
      <p style="text-align:center;font-size:1.2rem;color:#7c3aed;font-weight:600;">
        Which adventure will you choose today?
      </p>

      <div class="test-options">
        <a href="{{ url_for('test', session=session) }}" class="btn-primary">
          ✏️ Spelling Test 🚀
        </a>
        <a href="{{ url_for('definition_test', session=session) }}" class="btn-secondary">
          🔍 Definition Detective 🌈
        </a>
      </div>

      <div style="margin-top:24px;padding:18px;background:rgba(196,181,253,0.15);border-radius:18px;border:3px dashed #c4b5fd;">
        <p>🎧 <strong>Spelling Test:</strong> Listen carefully and type the word!</p>
        <p>🕵️ <strong>Definition Detective:</strong> Read the clue and pick the right word from the choices!</p>
      </div>
    </main>
  </body>
</html>
